name: nix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flake-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: flake check
        run: nix flake check --no-build --show-trace

      - name: Evaluate x86_64 config
        run: |
          nix eval \
            .#nixosConfigurations.latheos-x86_64.config.system.build.toplevel.drvPath \
            --no-write-lock-file

  daemon-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ruff==0.7.2
      - run: ruff check daemon/cam_daemon daemon/camctl
      - run: python -m compileall -q daemon/cam_daemon daemon/camctl
